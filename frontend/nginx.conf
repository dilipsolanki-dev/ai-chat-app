# nginx serves the built React app and forwards API calls to the backend.
# This is the production equivalent of Vite's dev proxy (vite.config.ts).

server {
    listen 80;

    # Serve the static SPA. try_files falls back to index.html so client-side
    # routes work on refresh (standard single-page-app pattern).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to the backend service (named "backend" in docker-compose).
    # `proxy_buffering off` is important for SSE: it lets tokens stream through
    # immediately instead of nginx buffering the whole response.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }
}
