# nginx serves the built React app and forwards API calls to the backend.
# This is the production equivalent of Vite's dev proxy (vite.config.ts).

server {
    listen 80;

    # Serve the static SPA. try_files falls back to index.html so client-side
    # routes work on refresh (standard single-page-app pattern).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Vite gives every JS/CSS bundle a content-hash in its filename (index-<hash>.js),
    # so a given URL's content never changes — cache it hard (a new build = a new URL).
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The SPA shell must NEVER be cached: it's what points at the latest hashed
    # bundle. no-cache = the browser re-validates it every load, so a rebuild shows
    # up on a normal refresh (no more "I rebuilt but still see the old UI").
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # Forward /api/* to the backend service (named "backend" in docker-compose).
    # `proxy_buffering off` is important for SSE: it lets tokens stream through
    # immediately instead of nginx buffering the whole response.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }
}
