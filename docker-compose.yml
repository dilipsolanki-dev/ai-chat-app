# docker-compose wires the three containers into one app with a shared network.
# Run everything:   docker compose up --build
# Stop:             docker compose down        (add -v to also wipe the DB volume)
#
# KEY INSIGHT: inside this network, services reach each other by SERVICE NAME,
# not localhost. So the backend talks to Postgres at host "db" (not localhost),
# and nginx proxies to "backend". That's the one mental shift from local dev.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ai_chat
      POSTGRES_PASSWORD: ai_chat
      POSTGRES_DB: ai_chat
    volumes:
      - pgdata:/var/lib/postgresql/data   # named volume = data survives restarts
    healthcheck:
      # Don't start the backend until Postgres is actually ready to accept queries.
      test: ["CMD-SHELL", "pg_isready -U ai_chat"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    image: dilipsolanki/ai-chat-backend:latest   # registry name: `compose build` tags it, `compose push` uploads it
    # Load the LLM config (OPENAI_API_KEY / OPENAI_BASE_URL / OPENAI_MODEL / USE_MOCK_AI)
    # straight from backend/.env — edit that one file and it works locally AND in Docker.
    # required:false so the stack still boots (mock mode) if a teammate has no .env yet.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override DATABASE_URL for the container: Postgres is at host "db" (the service
      # name), NOT localhost. `environment:` WINS over `env_file:`, so the localhost URL
      # inside backend/.env is correctly ignored here.
      DATABASE_URL: postgresql+asyncpg://ai_chat:ai_chat@db:5432/ai_chat
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"                  # expose the API on localhost:8000 too (for /docs)

  frontend:
    build: ./frontend
    image: dilipsolanki/ai-chat-frontend:latest   # registry name (see backend note)
    depends_on:
      - backend
    ports:
      - "5173:80"                    # visit the app at http://localhost:5173

volumes:
  pgdata:
